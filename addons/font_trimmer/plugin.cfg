[plugin]

name="Font Trimmer"
description="Export plugin. Allows reducing the size of font files at export time by specifying which characters to keep (sourced from one or more content files). All other characters are discarded, effectively 'trimming' the font(s). This process is also known as font subsetting. Configurable from Project Settings > General > Plugins > Font Trimmer. Requires fonttools."
author="Daniel Nora"
version="1.0"
script="font_trimmer_plugin_loader.gd"
